name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pybind11 scikit-build-core

      - name: Configure
        run: cmake -S . -B build -G Ninja

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Python smoke
        run: |
          PYTHONPATH=python python - <<'PY'
          from sdr_signal_analyzer import AnalyzerSession, ProcessingConfig, SourceConfig, SourceKind
          source = SourceConfig()
          source.kind = SourceKind.SIMULATOR
          session = AnalyzerSession(source, ProcessingConfig())
          assert session.start(), session.last_error()
          session.stop()
          print("python-smoke-ok")
          PY
