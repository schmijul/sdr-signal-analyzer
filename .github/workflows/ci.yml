name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ libegl1

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pybind11 scikit-build-core PySide6

      - name: Configure
        run: cmake -S . -B build -G Ninja -DSDR_ANALYZER_ENABLE_SOAPYSDR=OFF -DSDR_ANALYZER_ENABLE_UHD=OFF

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Install package for Python smoke
        run: python -m pip install -e ".[gui]"

      - name: GUI smoke
        run: |
          QT_QPA_PLATFORM=offscreen python - <<'PY'
          from sdr_signal_analyzer.gui import MainWindow
          from PySide6 import QtWidgets
          app = QtWidgets.QApplication([])
          window = MainWindow()
          window._toggle_stream()
          for _ in range(8):
              app.processEvents()
          assert window.grab().save("/tmp/sdr_gui_smoke.png")
          window._session.stop()
          print("gui-smoke-ok")
          PY

      - name: Python smoke
        run: |
          python - <<'PY'
          from sdr_signal_analyzer import AnalyzerSession, ProcessingConfig, SourceConfig, SourceKind
          source = SourceConfig()
          source.kind = SourceKind.SIMULATOR
          session = AnalyzerSession(source, ProcessingConfig())
          assert session.start(), session.last_error()
          session.stop()
          print("python-smoke-ok")
          PY

      - name: Link check
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --no-progress
            --verbose
            --exclude '^https://schmijul.github.io/sdr-signal-analyzer/?$'
            README.md docs
        env:
          GITHUB_TOKEN: ${{ github.token }}

  package-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ python3-dev

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist and wheel
        run: pyproject-build

      - name: Check package metadata
        run: twine check dist/*

      - name: Install built wheel
        run: python -m pip install PySide6 dist/*.whl

      - name: Installed-package smoke
        run: |
          python - <<'PY'
          from sdr_signal_analyzer import AnalyzerSession, ProcessingConfig, SourceConfig, SourceKind
          source = SourceConfig()
          source.kind = SourceKind.SIMULATOR
          session = AnalyzerSession(source, ProcessingConfig())
          assert session.start(), session.last_error()
          session.stop()
          print("installed-package-smoke-ok")
          PY

      - name: Demo smoke
        run: |
          python -m sdr_signal_analyzer.demo --frames 2
          sdr-signal-analyzer-demo --frames 2

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs mkdocs-material

      - name: Build documentation
        run: mkdocs build --strict

      - name: Link check
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --no-progress
            --verbose
            --exclude '^https://schmijul.github.io/sdr-signal-analyzer/?$'
            README.md docs
        env:
          GITHUB_TOKEN: ${{ github.token }}

  install-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fresh Ubuntu install smoke
        run: docker run --rm -v "${{ github.workspace }}:/work" -w /work ubuntu:24.04 bash scripts/install_smoke_ubuntu.sh
