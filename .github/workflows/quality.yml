name: Quality

on:
  push:
    branches:
      - main
      - codex/**
      - feat/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ gcovr

      - name: Install Python build and coverage tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install coverage pybind11 scikit-build-core PySide6

      - name: Configure with coverage flags
        run: |
          cmake -S . -B build-coverage -G Ninja \
            -DSDR_ANALYZER_ENABLE_SOAPYSDR=OFF \
            -DSDR_ANALYZER_ENABLE_UHD=OFF \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS=--coverage \
            -DCMAKE_EXE_LINKER_FLAGS=--coverage \
            -DCMAKE_SHARED_LINKER_FLAGS=--coverage \
            -DCMAKE_MODULE_LINKER_FLAGS=--coverage

      - name: Build
        run: cmake --build build-coverage

      - name: Run CTest
        run: ctest --test-dir build-coverage --output-on-failure

      - name: Collect Python coverage
        run: python3 scripts/python_coverage.py --output-dir quality-artifacts/python-coverage

      - name: Collect C++ coverage
        run: |
          mkdir -p quality-artifacts/cpp-coverage
          gcovr -r . build-coverage \
            --exclude 'tests/' \
            --exclude 'python/' \
            --html-details quality-artifacts/cpp-coverage/index.html \
            --xml-pretty -o quality-artifacts/cpp-coverage/coverage.xml \
            --print-summary

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-coverage
          path: quality-artifacts/
          if-no-files-found: warn

  benchmark:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Build CLI
        run: |
          cmake -S . -B build-benchmark -G Ninja \
            -DSDR_ANALYZER_ENABLE_SOAPYSDR=OFF \
            -DSDR_ANALYZER_ENABLE_UHD=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-benchmark

      - name: Run benchmarks
        run: python3 scripts/benchmark_ci.py --cli ./build-benchmark/sdr-analyzer-cli --output-dir quality-artifacts/benchmark

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-benchmark
          path: quality-artifacts/benchmark
