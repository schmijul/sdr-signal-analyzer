name: Docs

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs mkdocs-material

      - name: Build site
        run: mkdocs build --strict

      - name: Link check
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --no-progress
            --verbose
            --exclude '^https://schmijul.github.io/sdr-signal-analyzer/?$'
            README.md docs
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Check Pages configuration
        id: pages_check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api repos/${{ github.repository }}/pages >/dev/null 2>&1; then
            exit 0
          fi
          echo "GitHub Pages is not enabled for this repository." >&2
          echo "Enable Pages before merging this change so the docs site can deploy." >&2
          exit 1

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify published docs site
        env:
          SITE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -fsSL "$SITE_URL" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "Published docs site was not reachable at $SITE_URL." >&2
          exit 1
