site_name: SDR Signal Analyzer
site_description: C++-first SDR spectrum analyzer with a Python GUI, replay tooling, and optional live SDR backends.
site_url: https://schmijul.github.io/sdr-signal-analyzer/
repo_url: https://github.com/schmijul/sdr-signal-analyzer
repo_name: schmijul/sdr-signal-analyzer

theme:
  name: material
  features:
    - content.code.copy
    - navigation.instant
    - navigation.sections
    - navigation.top

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Notation Registry: notation.md
  - Code-Symbol Mapping: code-symbol-mapping.md
  - Terminology and Status Labels: terminology.md
  - Architecture: architecture.md
  - Public API: api.md
  - Trust and Limits: limitations.md
  - Diagnostics: diagnostics.md
  - Quality Evidence: quality-evidence.md
  - Replay and Recording: replay-and-recording.md
  - Release Readiness: release.md
  - Release Checklist: release_checklist.md
  - Hardware Validation Summary: hardware-validation.md
  - Hardware Validation Plan: hardware_validation_plan.md
  - Hardware Validation Status: hardware_validation_status.md
  - Hardware Validation Report Template: hardware_validation_report_template.md
  - Troubleshooting: troubleshooting.md
  - Recommended Workflows: workflows.md
  - Testing and Validation: testing.md
  - Benchmarking: benchmarking.md
  - Source Guides:
      - Overview: sources/index.md
      - rtl_tcp: sources/rtltcp.md
      - UHD / USRP: sources/uhd.md
      - SoapySDR: sources/soapy.md
  - Case Studies: case-studies.md
